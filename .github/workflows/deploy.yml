name: Deploy Zola to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build and deploy to gh-pages
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_BRANCH: gh-pages
          # BUILD_DIR: .           # uncomment if site root is different
          # OUT_DIR: public        # default build output
